            { id: 35, name: "청담이상", location: "대구점", year: "2016", category: "이자카야", images: ["images/2016/cheongdam_daegu_1.jpg","images/2016/cheongdam_daegu_2.jpg"] },
            { id: 36, name: "청담이상", location: "부산 서면점", year: "2016", category: "이자카야", images: ["images/2016/cheongdam_busan_1.jpg","images/2016/cheongdam_busan_2.jpg","images/2016/cheongdam_busan_3.jpg"] },
            { id: 37, name: "청담이상", location: "의정부점", year: "2016", category: "이자카야", images: ["images/2016/cheongdam_uijeongbu_1.jpg","images/2016/cheongdam_uijeongbu_2.jpg"] },
        ];

        const years = ['ALL', '2025', '2024', '2023', '2022', '2021', '2020', '2019', '2018', '2016'];

        function Navigation({ setCurrentPage, setFilter }) {
            const handleYearClick = (year) => {
                setFilter(year);
                setCurrentPage('projects');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            return (
                <nav>
                    <div className="logo" onClick={() => setCurrentPage('home')}>M.A.P+</div>
                    <ul className="nav-links">
                        <li><a onClick={() => setCurrentPage('about')}>ABOUT US</a></li>
                        <li>
                            <a onClick={() => handleYearClick('ALL')}>PROJECT</a>
                            <div className="dropdown-menu">
                                <div className="dropdown-content">
                                    {years.filter(y => y !== 'ALL').map(year => (
                                        <div key={year} className="dropdown-item" onClick={() => handleYearClick(year)}>{year}</div>
                                    ))}
                                </div>
                            </div>
                        </li>
                        <li><a onClick={() => setCurrentPage('contact')}>CONTACT</a></li>
                    </ul>
                </nav>
            );
        }

        function Lightbox({ images, currentIndex, onClose, onPrev, onNext }) {
            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key === 'Escape') onClose();
                    if (e.key === 'ArrowLeft') onPrev();
                    if (e.key === 'ArrowRight') onNext();
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [onClose, onPrev, onNext]);
            return (
                <div className="lightbox" onClick={onClose}>
                    <div className="lightbox-close">×</div>
                    <div className="lightbox-nav lightbox-prev" onClick={(e) => { e.stopPropagation(); onPrev(); }}>‹</div>
                    <img src={images[currentIndex]} alt="" onClick={(e) => e.stopPropagation()} />
                    <div className="lightbox-nav lightbox-next" onClick={(e) => { e.stopPropagation(); onNext(); }}>›</div>
                </div>
            );
        }

        function Home({ setCurrentPage, setFilter }) {
            const recentProjects = (() => {
                const byCategory = {};
                projectsData.forEach(p => {
                    if (!byCategory[p.category]) byCategory[p.category] = [];
                    byCategory[p.category].push(p);
                });
                const result = [];
                Object.values(byCategory).forEach(projects => {
                    result.push(...projects.slice(0, 2));
                });
                return result;
            })();
            return (
                <>
                    <div className="hero">
                        <div className="hero-content">
                            <h1>M.A.P+</h1>
                            <div className="hero-subtitle">Interior Design Studio</div>
                            <div className="hero-tagline">
                                <div className="tagline-item"><span className="tagline-letter">M</span><span className="tagline-word">Make</span></div>
                                <div className="tagline-item"><span className="tagline-letter">A</span><span className="tagline-word">Analyze</span></div>
                                <div className="tagline-item"><span className="tagline-letter">P</span><span className="tagline-word">Plan</span></div>
                                <div className="tagline-item"><span className="tagline-letter">+</span><span className="tagline-word">Plus</span></div>
                            </div>
                        </div>
                    </div>
                    <div className="content-wrapper">
                        <div className="section-header">
                            <h2 className="section-title">Recent Projects</h2>
                            <p className="section-subtitle">최근 프로젝트</p>
                        </div>
                        <div className="masonry-grid">
                            {recentProjects.map((project, idx) => (
                                <div key={project.id} className={`project-card ${ratios[idx % ratios.length]}`} onClick={() => { setCurrentPage('detail'); window.selectedProject = project; }}>
                                    <img src={project.images[0]} alt={project.name} loading="lazy" />
                                    <div className="project-overlay">
                                        <div className="project-name">{project.name}{project.location ? ` - ${project.location}` : ''}</div>
                                        <div className="project-category">{project.category}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </>
            );
        }

        function Projects({ filter, setFilter, setCurrentPage }) {
            const filtered = filter === 'ALL' ? projectsData : projectsData.filter(p => p.year === filter);
            return (
                <div className="content-wrapper" style={{paddingTop: '7rem'}}>
                    <div className="section-header">
                        <h2 className="section-title">Projects</h2>
                        <p className="section-subtitle">Our Project</p>
                    </div>
                    <div className="filter-container">
                        {years.map(year => (
                            <button key={year} className={`filter-btn ${filter === year ? 'active' : ''}`} onClick={() => setFilter(year)}>{year}</button>
                        ))}
                    </div>
                    <div className="masonry-grid">
                        {filtered.map((project, idx) => (
                            <div key={project.id} className={`project-card ${ratios[idx % ratios.length]}`} onClick={() => { setCurrentPage('detail'); window.selectedProject = project; }}>
                                <img src={project.images[0]} alt={project.name} loading="lazy" />
                                <div className="project-overlay">
                                    <div className="project-name">{project.name}{project.location ? ` - ${project.location}` : ''}</div>
                                    <div className="project-category">{project.category}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ProjectDetail({ setCurrentPage }) {
            const project = window.selectedProject;
            const [lightboxOpen, setLightboxOpen] = useState(false);
            const [lightboxIndex, setLightboxIndex] = useState(0);
            if (!project) return null;
            return (
                <div className="project-detail">
                    <div className="back-btn" onClick={() => setCurrentPage('projects')}>← 목록으로</div>
                    <div className="detail-header">
                        <h1 className="detail-title">{project.name}{project.location ? ` - ${project.location}` : ''}</h1>
                        <div className="detail-category">{project.year}</div>
                    </div>
                    <div className="detail-images">
                        {project.images.map((img, idx) => (
                            <img key={idx} src={img} alt="" loading="lazy" onClick={() => { setLightboxIndex(idx); setLightboxOpen(true); }} />
                        ))}
                    </div>
                    {lightboxOpen && (
                        <Lightbox 
                            images={project.images}
                            currentIndex={lightboxIndex}
                            onClose={() => setLightboxOpen(false)}
                            onPrev={() => setLightboxIndex((lightboxIndex - 1 + project.images.length) % project.images.length)}
                            onNext={() => setLightboxIndex((lightboxIndex + 1) % project.images.length)}
                        />
                    )}
                </div>
            );
        }

        function About() {
            return (
                <div className="about-page">
                    <h1>ABOUT US</h1>
                    <p className="about-intro">M.A.P+는 주거 및 상업 공간 인테리어 디자인 전문 스튜디오입니다. 창의적인 솔루션으로 고객의 공간에 새로운 가치를 더합니다.</p>
                    <div className="about-content">
                        <div className="about-section">
                            <h2>M.A.P+</h2>
                            <div className="map-item"><h3>Make</h3><p>창의적인 솔루션을 제공합니다.</p></div>
                            <div className="map-item"><h3>Analyze</h3><p>맞춤형 디자인을 구현합니다.</p></div>
                            <div className="map-item"><h3>Plan +</h3><p>철저한 계획 수립과 실행으로 만족도를 높입니다.</p></div>
                        </div>
                        <div className="about-section">
                            <h2>WHAT WE DO</h2>
                            <p>음식점, 카페, 바, 사진관, 사무실 등 다양한 상업 공간의 인테리어 디자인과 시공을 진행합니다.</p>
                            <p>공간의 특성과 브랜드 아이덴티티를 반영한 맞춤형 디자인으로 고객의 비즈니스 성공을 돕습니다.</p>
                        </div>
                    </div>
                </div>
            );
        }

        function Contact() {
            return (
                <div className="contact-page">
                    <h1>CONTACT</h1>
                    <div className="contact-info">
                        <div className="contact-item"><div className="contact-label">TEL</div><div className="contact-value">010-7363-0280</div></div>
                        <div className="contact-item"><div className="contact-label">EMAIL</div><div className="contact-value">ino87x@naver.com</div></div>
                        <div className="contact-item"><div className="contact-label">LOCATION</div><div className="contact-value">Seoul, Korea</div></div>
                    </div>
                </div>
            );
        }

        function Footer() {
            return (
                <div className="footer">
                    <div className="footer-content">
                        <h2>LET'S WORK TOGETHER</h2>
                        <div className="footer-grid">
                            <div><div className="footer-label">TEL</div><div className="footer-value">010-7363-0280</div></div>
                            <div><div className="footer-label">EMAIL</div><div className="footer-value">ino87x@naver.com</div></div>
                        </div>
                        <div className="footer-copyright">ⓒ 2022 엠에이피플러스 M.A.P+</div>
                    </div>
                </div>
            );
        }

        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [filter, setFilter] = useState('ALL');
            useEffect(() => {
                const handlePopState = (e) => setCurrentPage(e.state?.page || 'home');
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);
            const changePage = (page) => {
                window.history.pushState({ page }, '', `#${page}`);
                setCurrentPage(page);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            let content;
            switch(currentPage) {
                case 'home': content = <Home setCurrentPage={changePage} setFilter={setFilter} />; break;
                case 'projects': content = <Projects filter={filter} setFilter={setFilter} setCurrentPage={changePage} />; break;
                case 'detail': content = <ProjectDetail setCurrentPage={changePage} />; break;
                case 'about': content = <About />; break;
                case 'contact': content = <Contact />; break;
                default: content = <Home setCurrentPage={changePage} setFilter={setFilter} />;
            }
            return (
                <>
                    <Navigation setCurrentPage={changePage} setFilter={setFilter} />
                    <main>{content}</main>
                    <Footer />
                </>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
